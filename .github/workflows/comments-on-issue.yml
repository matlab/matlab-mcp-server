name: Processing new comments on issues

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  remove-waiting-for-info:
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'waiting-for-info') &&
      github.event.comment.author_association != 'OWNER' &&
      github.event.comment.author_association != 'MEMBER' &&
      github.event.comment.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - name: Remove waiting-for-info label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'waiting-for-info'
              });
            } catch (error) {
              if (error.status === 404) {
                console.log('Label already removed');
              } else {
                throw error;
              }
            }
